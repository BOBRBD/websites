<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Борис — Вентиляция и кондиционеры</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      overflow-y: auto;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
      background: rgba(8, 18, 36, 0.65);
      border: 1px solid rgba(0, 180, 255, 0.1);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 40px 100px rgba(0,0,0,0.88),
        0 0 80px rgba(0,100,255,0.06);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 29px;
      background: linear-gradient(135deg, rgba(0,198,255,0.18) 0%, transparent 45%, rgba(0,70,255,0.12) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* ── Avatar ── */
    .avatar-outer {
      width: 92px;
      height: 92px;
      margin: 0 auto 30px;
      position: relative;
    }

    .avatar-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,198,255,0.22) 0%, transparent 70%);
      animation: breathe 3.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.18); opacity: 1; }
    }

    .avatar {
      position: relative;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: linear-gradient(145deg, #05111f, #092035);
      border: 1.5px solid rgba(0,198,255,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 12%;
    }

    .avatar::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(0,198,255,0.14), transparent 60%);
    }

    .snowflake {
      position: relative;
      z-index: 1;
      animation: spin 28s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Name ── */
    .name {
      font-size: clamp(3rem, 14vw, 4.2rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #fff 0%, #a8e8ff 28%, #fff 50%, #6ec8ff 75%, #fff 100%);
      background-size: 260% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 5s linear infinite, name-glow 3.2s ease-in-out infinite;
    }

    @keyframes shine { to { background-position: 260% center; } }

    @keyframes name-glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0,198,255,0.28)) drop-shadow(0 0 28px rgba(0,100,255,0.14)); }
      50%       { filter: drop-shadow(0 0 22px rgba(0,198,255,0.60)) drop-shadow(0 0 50px rgba(0,100,255,0.28)); }
    }

    /* ── Role badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 14px;
      border-radius: 20px;
      background: rgba(0,198,255,0.07);
      border: 1px solid rgba(0,198,255,0.18);
      margin-bottom: 12px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00c6ff;
      animation: blink 2.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .badge span {
      font-size: 0.7rem;
      color: rgba(0,198,255,0.8);
      text-transform: uppercase;
      letter-spacing: 0.13em;
      font-weight: 600;
    }

    /* ── Spec text ── */
    .spec {
      font-size: 0.98rem;
      color: rgba(255,255,255,0.58);
      line-height: 1.65;
      margin-bottom: 24px;
    }

    .spec strong { color: rgba(255,255,255,0.88); font-weight: 600; }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      margin-bottom: 30px;
    }

    .tag {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(130,200,255,0.85);
      background: rgba(0,100,200,0.1);
      border: 1px solid rgba(0,150,255,0.13);
      transition: background 0.25s, border-color 0.25s, color 0.25s;
      cursor: default;
    }

    .tag:hover {
      background: rgba(0,150,255,0.2);
      border-color: rgba(0,180,255,0.35);
      color: rgba(190,230,255,1);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,180,255,0.22), transparent);
      margin-bottom: 28px;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .soc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .soc-btn {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s, border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .soc-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.09), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .soc:hover .soc-btn        { transform: translateY(-6px) scale(1.08); }
    .soc:hover .soc-btn::after { opacity: 1; }
    .soc:active .soc-btn       { transform: translateY(-2px) scale(1.03); }

    .soc-label {
      font-size: 0.63rem;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    .soc:hover .soc-label { color: rgba(255,255,255,0.65); }

    .soc-tg .soc-btn  { background: rgba(38,168,224,0.1);  border-color: rgba(38,168,224,0.18); }
    .soc-wa .soc-btn  { background: rgba(37,211,102,0.1);  border-color: rgba(37,211,102,0.18); }
    .soc-vk .soc-btn  { background: rgba(74,118,168,0.1);  border-color: rgba(74,118,168,0.18); }
    .soc-ph .soc-btn  { background: rgba(0,198,255,0.1);   border-color: rgba(0,198,255,0.18);  }

    .soc-tg:hover .soc-btn { background: rgba(38,168,224,0.18); border-color: rgba(38,168,224,0.52); box-shadow: 0 10px 30px rgba(38,168,224,0.28); }
    .soc-wa:hover .soc-btn { background: rgba(37,211,102,0.18); border-color: rgba(37,211,102,0.52); box-shadow: 0 10px 30px rgba(37,211,102,0.28); }
    .soc-vk:hover .soc-btn { background: rgba(74,118,168,0.18); border-color: rgba(74,118,168,0.52); box-shadow: 0 10px 30px rgba(74,118,168,0.28); }
    .soc-ph:hover .soc-btn { background: rgba(0,198,255,0.18);  border-color: rgba(0,198,255,0.52);  box-shadow: 0 10px 30px rgba(0,198,255,0.28);  }

    /* ── CTA Button ── */
    .cta-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }

    .cta-ripple {
      position: absolute;
      inset: -2px;
      border-radius: 56px;
      background: linear-gradient(135deg, rgba(0,198,255,0.5), rgba(0,70,255,0.5));
      animation: ripple 2.6s ease-out infinite;
      pointer-events: none;
    }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 42px;
      border-radius: 56px;
      background: linear-gradient(135deg, #00c6ff 0%, #0046e0 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.04em;
      box-shadow: 0 6px 28px rgba(0,100,255,0.42);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
      overflow: hidden;
    }

    .cta::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 50%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-20deg);
      transition: left 0.55s ease;
    }

    .cta:hover          { transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 40px rgba(0,100,255,0.55); }
    .cta:hover::after   { left: 150%; }
    .cta:active         { transform: scale(0.97); }

    /* ── Availability ── */
    .avail {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .avail-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00d4a0;
      box-shadow: 0 0 8px rgba(0,212,160,0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px rgba(0,212,160,0.7);  transform: scale(1);   }
      50%       { box-shadow: 0 0 14px rgba(0,212,160,1.0); transform: scale(1.25); }
    }

    .avail-text {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.06em;
    }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      .card    { padding: 36px 22px 32px; border-radius: 22px; }
      .socials { gap: 10px; }
      .soc-btn { width: 48px; height: 48px; border-radius: 15px; }
      .cta     { padding: 14px 32px; font-size: 0.93rem; }
    }
  </style>
</head>

<script>
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  let W, H, pts;

  function setup() {
    W = cvs.width  = innerWidth;
    H = cvs.height = innerHeight;
    const count = Math.min(65, Math.floor(W * H / 13000));
    pts = Array.from({ length: count }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  Math.random() * 1.3 + 0.3,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      a:  Math.random() * 0.32 + 0.08,
      hue: Math.random() > 0.55 ? 195 : 220,
    }));
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < pts.length - 1; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const a = pts[i], b = pts[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < 115) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(0,170,255,${0.055 * (1 - d / 115)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.283);
      ctx.fillStyle = `hsla(${p.hue},100%,72%,${p.a})`;
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -8) p.x = W + 8;
      if (p.x > W + 8) p.x = -8;
      if (p.y < -8) p.y = H + 8;
      if (p.y > H + 8) p.y = -8;
    });

    requestAnimationFrame(frame);
  }

  setup();
  frame();
  addEventListener('resize', setup);
</script>
